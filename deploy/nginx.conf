# /etc/nginx/sites-available/fundsTransfer
# Placeholders __SERVER_NAME__ and __APP_DIR__ are filled in by deploy/deploy.sh.

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name __SERVER_NAME__;

    # Hardening
    server_tokens off;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # API reverse proxy
    location /api/ {
        proxy_pass         http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 1m;
    }

    # Health passthrough
    location = /health {
        proxy_pass http://127.0.0.1:4000/health;
    }

    # SPA: serve built assets from frontend/dist
    root __APP_DIR__/frontend/dist;
    index index.html;

    # Hashed assets — cache hard
    location /assets/ {
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Everything else falls back to index.html for client-side routing
    location / {
        try_files $uri /index.html;
    }
}
